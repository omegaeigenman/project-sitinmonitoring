<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — CCS Sit-in Monitoring</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { background: #f4f6fb; }

    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.6rem 1.2rem 2.5rem;
    }

    /* ── Page Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
    }
    .page-title {
      font-size: 1.45rem; font-weight: 800; color: #1a1a2e;
      display: flex; align-items: center; gap: .55rem;
      text-transform: uppercase; letter-spacing: .02em;
    }
    .page-title-icon {
      font-size: 1.3rem; background: #2E4099; color: #fff;
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Card container ── */
    .card-wrap {
      background: #fff; border-radius: 12px;
      border: 1.5px solid #e5e7f0;
      box-shadow: 0 2px 12px rgba(46,64,153,.07);
      overflow: hidden; margin-bottom: 1.4rem;
    }
    .card-head {
      background: linear-gradient(90deg,#1e3a6e 0%,#2547a0 100%);
      color: #fff; padding: .8rem 1.1rem;
      font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Formula pills ── */
    .lb-formula {
      display: flex; gap: .5rem; padding: .7rem 1rem;
      background: #f8f9ff; border-bottom: 1px solid #e8ecf8; flex-wrap: wrap;
    }
    .lb-pill {
      display: flex; align-items: center; gap: .3rem;
      padding: .22rem .65rem; border-radius: 20px;
      font-size: .76rem; font-weight: 600; white-space: nowrap;
    }
    .lb-pill-pts   { background: #fef3c7; color: #92400e; }
    .lb-pill-hrs   { background: #d1fae5; color: #065f46; }
    .lb-pill-task  { background: #ede9fe; color: #4c1d95; }
    .lb-pill-score { background: #dbeafe; color: #1e40af; margin-left: auto; }
    .pill-pct      { font-size: .68rem; opacity: .75; }

    /* ── Podium ── */
    .lb-podium {
      display: flex; align-items: flex-end;
      justify-content: center; gap: .6rem; margin: 1.2rem 0 1.4rem;
    }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: .3rem; }
    .podium-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: #fff; font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid #fff; box-shadow: 0 2px 10px rgba(0,0,0,.18);
    }
    .podium-avatar.rank-1 { width: 64px; height: 64px; font-size: 1.15rem; background: linear-gradient(135deg,#f59e0b,#ef4444); }
    .podium-avatar.rank-2 { background: linear-gradient(135deg,#6b7280,#374151); }
    .podium-avatar.rank-3 { background: linear-gradient(135deg,#92400e,#b45309); }
    .podium-crown { font-size: 1rem; }
    .podium-name  { font-size: .73rem; font-weight: 600; color: #1a1a2e; text-align: center; max-width: 72px; word-break: break-word; }
    .podium-score { font-size: .7rem; color: #6b7280; }
    .podium-bar {
      border-radius: 6px 6px 0 0; width: 56px;
      display: flex; align-items: flex-end; justify-content: center;
      font-size: .73rem; font-weight: 700; color: #fff; padding-bottom: 5px;
    }
    .podium-bar.rank-1 { background: linear-gradient(180deg,#fbbf24,#f59e0b); height: 78px; }
    .podium-bar.rank-2 { background: linear-gradient(180deg,#9ca3af,#6b7280); height: 56px; }
    .podium-bar.rank-3 { background: linear-gradient(180deg,#d97706,#92400e); height: 42px; }

    /* ── Highlight current student ── */
    .lb-row.me {
      background: linear-gradient(90deg, #eef1ff, #e0e7ff) !important;
      border-left: 3px solid #2547a0;
    }
    .lb-me-badge {
      display: inline-block; background: #2547a0; color: #fff;
      font-size: .62rem; font-weight: 700; padding: .1rem .4rem;
      border-radius: 8px; margin-left: .3rem; vertical-align: middle;
    }

    /* ── My rank card ── */
    .my-rank-card {
      display: flex; align-items: center; gap: 1rem;
      background: linear-gradient(135deg, #1e3a6e 0%, #2547a0 100%);
      color: #fff; border-radius: 10px; padding: .9rem 1.2rem;
      margin: 0 1rem 1rem; box-shadow: 0 3px 12px rgba(30,58,110,.35);
    }
    .my-rank-num {
      font-size: 1.7rem; font-weight: 800;
      min-width: 56px; text-align: center;
      line-height: 1;
    }
    .my-rank-num small { display: block; font-size: .65rem; font-weight: 600; opacity: .7; margin-top: 2px; }
    .my-rank-info { flex: 1; }
    .my-rank-name { font-weight: 700; font-size: .92rem; }
    .my-rank-stats { font-size: .76rem; opacity: .8; margin-top: .15rem; }
    .my-rank-score {
      background: rgba(255,255,255,.2); border-radius: 20px;
      padding: .3rem .8rem; font-weight: 700; font-size: .9rem;
    }

    /* ── List ── */
    .lb-col-hdr {
      display: grid;
      grid-template-columns: 28px 1fr 52px 50px 48px 58px;
      gap: .4rem; padding: .25rem .6rem;
      font-size: .71rem; font-weight: 600; color: #9ca3af;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem;
    }
    .lb-col-hdr span { text-align: center; }
    .lb-col-hdr span:nth-child(2) { text-align: left; }

    .lb-row {
      display: grid;
      grid-template-columns: 28px 1fr 52px 50px 48px 58px;
      align-items: center; gap: .4rem;
      padding: .45rem .6rem; border-radius: 8px;
      font-size: .82rem; background: #f8f9fc;
      margin-bottom: .35rem; transition: background .12s;
    }
    .lb-row:hover { background: #eef1ff; }
    .lb-row.top3  { background: #fef9ec; }
    .lb-rank-num  { font-weight: 700; color: #6b7280; text-align: center; font-size: .8rem; }
    .lb-name      { font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-cell      { text-align: center; font-size: .8rem; color: #555; }
    .lb-score-badge {
      background: linear-gradient(90deg,#1e3a6e,#2547a0);
      color: #fff; border-radius: 20px;
      padding: .18rem .5rem; font-size: .74rem; font-weight: 700; text-align: center;
    }
    .lb-empty { text-align: center; color: #aaa; font-size: .85rem; padding: 2rem 0; }

    /* search/filter bar */
    .lb-toolbar {
      display: flex; align-items: center; gap: .6rem;
      padding: .7rem 1rem; border-bottom: 1px solid #eef0f8; flex-wrap: wrap;
    }
    .lb-search {
      padding: .38rem .75rem; border: 1.5px solid #d0d4e8;
      border-radius: 7px; font-family: inherit; font-size: .84rem;
      outline: none; width: 200px; transition: border .15s;
    }
    .lb-search:focus { border-color: #1e3a6e; }
    .lb-count { font-size: .8rem; color: #888; margin-left: auto; }

    @media (max-width: 600px) {
      .lb-col-hdr, .lb-row {
        grid-template-columns: 24px 1fr 40px 40px 36px 46px;
      }
      .my-rank-card { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <nav class="navbar dash-navbar">
    <div class="dash-brand" style="display:flex;align-items:center;gap:0.5rem;"><img src="CCS.png" alt="CCS" style="width:30px;height:30px;object-fit:contain;border-radius:50%;border:1.5px solid rgba(245,168,0,0.5);" onerror="this.style.display='none'"/><span>College of Computer Studies</span></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="student_notifications.html">Notifications</a></li>
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="student_session.html">My Sessions</a></li>
      <li><a href="student_history.html">History &amp; Feedback</a></li>
      <li><a href="student_reservation.html">Reservation</a></li>
      <li><a href="edit_profile.html">Edit Profile</a></li>
      <li><a href="student_labstatus.html">Lab Status</a></li>
      <li><a href="student_leaderboard.html" class="active">Leaderboard</a></li>
      <li><a href="student_summary.html">My Summary</a></li>
      <li><a href="#" class="btn-logout-nav" onclick="handleLogout()">Log out</a></li>
    </ul>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </nav>

  <div class="page-wrap">
    <!-- Page Header -->
    <div class="page-header">
      <div class="page-title">
        <span class="page-title-icon">&#127942;</span>
        Student Leaderboard
      </div>
    </div>

    <div class="card-wrap">
      <div class="card-head">&#127942; Leaderboard Rankings</div>


      <!-- My Rank Card -->
      <div class="my-rank-card" id="myRankCard" style="display:none;">
        <div class="my-rank-num" id="myRankNum">—<small>Your Rank</small></div>
        <div class="my-rank-info">
          <div class="my-rank-name" id="myRankName">—</div>
          <div class="my-rank-stats" id="myRankStats">—</div>
        </div>
        <div class="my-rank-score" id="myRankScore">0</div>
      </div>

      <!-- Podium -->
      <div style="padding:0 1rem;">
        <div class="lb-podium" id="lbPodium">
          <span style="color:#aaa;font-size:.85rem;">Loading...</span>
        </div>
      </div>
      <!-- Search -->
      <div class="lb-toolbar">
        <input class="lb-search" type="text" id="lbSearch" placeholder="&#128269; Search student..." oninput="renderList()"/>
        <span class="lb-count" id="lbCount"></span>
      </div>
      <!-- Column headers + list -->
      <div style="padding:0 .5rem .8rem;">
        <div class="lb-col-hdr">
          <span>#</span><span style="text-align:left;">Student</span>
          <span>Pts</span><span>Hrs</span><span>Tasks</span><span>Score</span>
        </div>
        <div id="lbList"><div class="lb-empty">Loading...</div></div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script src="db.js"></script>
  <script src="script.js"></script>
  <script>
    let _board = [];
    let _myId  = '';

    async function initLeaderboard() {
      const sess = sessionGet();
      if (!sess) { window.location.href = 'login.html'; return; }
      _myId = sess.id_number;

      await initDB();
      dbEnsurePointsTable();
      _board = dbGetLeaderboard();

      // Render my rank card
      renderMyRank();
      renderPodium(_board.slice(0, 3));
      renderList();
    }

    function initials(name) {
      return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function renderMyRank() {
      const idx = _board.findIndex(r => r.id_number === _myId);
      const card = document.getElementById('myRankCard');
      if (idx < 0) { card.style.display = 'none'; return; }
      const me = _board[idx];
      card.style.display = 'flex';
      document.getElementById('myRankNum').innerHTML = `#${idx + 1}<small>Your Rank</small>`;
      document.getElementById('myRankName').textContent = me.fullname;
      document.getElementById('myRankStats').textContent = `${me.earned} pts · ${me.sitinHours} hrs · ${me.tasks} tasks`;
      document.getElementById('myRankScore').textContent = me.score;
    }

    function renderPodium(top3) {
      const el = document.getElementById('lbPodium');
      if (!top3.length) { el.innerHTML = '<span style="color:#aaa;font-size:.85rem;">No students yet.</span>'; return; }
      const order = top3.length >= 3 ? [top3[1],top3[0],top3[2]]
                  : top3.length === 2 ? [top3[1],top3[0]] : [top3[0]];
      const rankOf = p => top3.indexOf(p) + 1;
      const crowns = { 1:'👑', 2:'🥈', 3:'🥉' };
      el.innerHTML = order.map(p => {
        const rk = rankOf(p);
        const isMe = p.id_number === _myId;
        return `
          <div class="podium-slot">
            <div class="podium-crown">${crowns[rk]||''}</div>
            <div class="podium-avatar rank-${rk}">${initials(p.fullname)}</div>
            <div class="podium-name">${p.fullname.split(' ')[0]}${isMe ? ' <span class="lb-me-badge">YOU</span>' : ''}</div>
            <div class="podium-score">${p.score} pts</div>
            <div class="podium-bar rank-${rk}">#${rk}</div>
          </div>`;
      }).join('');
    }

    function renderList() {
      const q = (document.getElementById('lbSearch').value || '').toLowerCase();
      const list = q ? _board.filter(r => r.fullname.toLowerCase().includes(q) || r.id_number.includes(q)) : _board;
      document.getElementById('lbCount').textContent = `${list.length} student(s)`;
      const el = document.getElementById('lbList');
      if (!list.length) { el.innerHTML = '<div class="lb-empty">No students found.</div>'; return; }
      el.innerHTML = list.map((r, i) => {
        const isMe = r.id_number === _myId;
        return `
        <div class="lb-row ${i < 3 && !q ? 'top3' : ''} ${isMe ? 'me' : ''}">
          <span class="lb-rank-num">${i + 1}</span>
          <span class="lb-name" title="${r.fullname} (${r.id_number})">${r.fullname}${isMe ? ' <span class="lb-me-badge">YOU</span>' : ''}</span>
          <span class="lb-cell">${r.earned}</span>
          <span class="lb-cell">${r.sitinHours}</span>
          <span class="lb-cell">${r.tasks}</span>
          <span class="lb-score-badge">${r.score}</span>
        </div>`;
      }).join('');
    }

    function handleLogout() { sessionClear(); window.location.href = 'login.html'; }
    document.addEventListener('DOMContentLoaded', initLeaderboard);
  </script>
</body>
</html>
